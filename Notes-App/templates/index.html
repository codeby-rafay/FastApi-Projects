<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iNotes - Take Your Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="static/style.css">
    <style>
        body {
            background: #f8f9fa;
        }

        .card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .badge-important {
            font-size: 0.9rem;
        }

        #searchInput {
            max-width: 400px;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><b>iNotes</b></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
                </ul>
                <form class="d-flex" role="search" onsubmit="return false;">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"
                        id="searchInput">
                </form>
            </div>
        </div>
    </nav>

    <!-- Add Note Form -->
    <div class="container my-5">
        <h1 class="text-center mb-4">Start Adding Your Notes!</h1>
        <form action="/" method="post">
            <div class="row mb-3">
                <label for="title" class="col-sm-2 col-form-label"><b>Note Title</b></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="title" id="title" required>
                </div>
            </div>
            <div class="row mb-3">
                <label for="desc" class="col-sm-2 col-form-label"><b>Note Description</b></label>
                <div class="col-sm-10">
                    <input type="text" class="form-control" name="desc" id="desc" required>
                </div>
            </div>
            <div class="row mb-4">
                <div class="col-sm-10 offset-sm-2">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="important" name="important">
                        <label class="form-check-label" for="important">Mark as Important</label>
                    </div>
                </div>
            </div>
            <div class="text-center">
                <button type="submit" class="btn btn-dark">Submit</button>
            </div>
        </form>
    </div>

    <!-- Notes Display -->
    <div class="container my-5">
        <h2 class="mb-4">Your Notes</h2>

        <div id="notesContainer">
            {% if not newDocs %}
            <p>No data found.</p>
            {% endif %}

            {% for item in newDocs %}
            <div class="card mb-3" data-title="{{ item.title }}">
                <div class="card-body">
                    <h5>{{ item.title }}</h5>
                    <p>{{ item.desc }}</p>

                    {% if item.important %}
                    <span class="badge bg-primary badge-important">Important</span>
                    {% endif %}

                    <div class="mt-3">
                        <a href="/delete/{{ item.id }}" class="btn btn-danger btn-sm">Delete</a>
                        <a href="/edit/{{ item.id }}" class="btn btn-warning btn-sm">Edit</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Search JS -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const searchInput = document.getElementById('searchInput');
            const notes = document.querySelectorAll('#notesContainer .card');

            searchInput.addEventListener('input', function () {
                const query = this.value.toLowerCase().trim();

                notes.forEach(note => {
                    const title = note.getAttribute('data-title').toLowerCase();
                    note.style.display = title.includes(query) ? '' : 'none';
                });
            });
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
